<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator — CodeAlpha Task 2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --calc-bg: #0f3460;
      --btn-bg: #1a1a2e;
      --btn-op: #e94560;
      --btn-eq: #0f3460;
      --btn-func: #533483;
      --accent: #e94560;
      --text: #eaeaea;
      --muted: #8899aa;
      --display-bg: #0a0a1a;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 1rem;
    }

    h1 {
      color: var(--text);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .calculator {
      background: var(--panel);
      border-radius: 24px;
      padding: 1.5rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    }

    /* Display */
    .display {
      background: var(--display-bg);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
    }

    .display .history {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      min-height: 1.1em;
      word-break: break-all;
      text-align: right;
    }

    .display .expression {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      color: #7799bb;
      min-height: 1.4em;
      word-break: break-all;
      text-align: right;
    }

    .display .result {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.8rem, 8vw, 2.5rem);
      font-weight: 700;
      color: var(--text);
      word-break: break-all;
      text-align: right;
      transition: color 0.2s;
    }

    .display .result.computed { color: var(--accent); }

    /* Buttons */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
    }

    .btn {
      background: var(--btn-bg);
      color: var(--text);
      border: none;
      border-radius: 12px;
      padding: 0;
      height: 66px;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.1s;
      border-radius: inherit;
    }

    .btn:active::after { opacity: 0.1; }
    .btn:active { transform: scale(0.95); }

    .btn.op { background: var(--btn-op); font-size: 1.3rem; }
    .btn.func { background: var(--btn-func); font-size: 0.9rem; }
    .btn.equals { background: var(--accent); font-size: 1.4rem; grid-row: span 2; height: 140px; }
    .btn.zero { grid-column: span 2; }
    .btn.active-op { box-shadow: 0 0 0 2px var(--accent); }

    /* Keyboard hint */
    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 1rem;
      letter-spacing: 0.5px;
    }

    .hint kbd {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>

<h1>Calculator</h1>

<div class="calculator">
  <div class="display">
    <div class="history" id="history"></div>
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="buttons">
    <button class="btn func" data-action="clear">AC</button>
    <button class="btn func" data-action="sign">+/−</button>
    <button class="btn func" data-action="percent">%</button>
    <button class="btn op" data-op="÷">÷</button>

    <button class="btn" data-num="7">7</button>
    <button class="btn" data-num="8">8</button>
    <button class="btn" data-num="9">9</button>
    <button class="btn op" data-op="×">×</button>

    <button class="btn" data-num="4">4</button>
    <button class="btn" data-num="5">5</button>
    <button class="btn" data-num="6">6</button>
    <button class="btn op" data-op="−">−</button>

    <button class="btn" data-num="1">1</button>
    <button class="btn" data-num="2">2</button>
    <button class="btn" data-num="3">3</button>
    <button class="btn op" data-op="+">+</button>

    <button class="btn zero" data-num="0">0</button>
    <button class="btn" data-action="dot">.</button>
    <button class="btn equals" data-action="equals">=</button>
  </div>
</div>

<p class="hint">Keyboard: <kbd>0–9</kbd> <kbd>+ − * /</kbd> <kbd>Enter</kbd> <kbd>Esc</kbd> <kbd>Backspace</kbd></p>

<script>
  const display = {
    history: document.getElementById('history'),
    expression: document.getElementById('expression'),
    result: document.getElementById('result'),
  };

  let state = {
    current: '0',
    prev: null,
    op: null,
    justComputed: false,
    expression: '',
  };

  function formatNum(n) {
    const s = parseFloat(n.toPrecision(12)).toString();
    if (s.length > 12) return parseFloat(n.toPrecision(8)).toString();
    return s;
  }

  function compute(a, op, b) {
    const fa = parseFloat(a), fb = parseFloat(b);
    switch (op) {
      case '+': return fa + fb;
      case '−': return fa - fb;
      case '×': return fa * fb;
      case '÷': return fb === 0 ? 'Error' : fa / fb;
    }
  }

  function updateDisplay() {
    display.result.textContent = state.current;
    display.expression.textContent = state.expression;
    display.result.classList.toggle('computed', state.justComputed);
  }

  function inputNum(n) {
    if (state.justComputed) {
      state.current = n;
      state.expression = '';
      state.justComputed = false;
    } else if (state.current === '0' && n !== '.') {
      state.current = n;
    } else if (n === '.' && state.current.includes('.')) {
      return;
    } else if (state.current.length >= 12) {
      return;
    } else {
      state.current += n;
    }
    updateDisplay();
  }

  function setOp(op) {
    if (state.op && !state.justComputed) {
      const res = compute(state.prev, state.op, state.current);
      if (res === 'Error') { state.current = 'Error'; state.op = null; updateDisplay(); return; }
      state.prev = formatNum(res);
      state.current = formatNum(res);
    } else {
      state.prev = state.current;
    }
    state.op = op;
    state.expression = `${state.prev} ${op}`;
    state.justComputed = false;
    // Visually highlight active op button
    document.querySelectorAll('.btn.op').forEach(b => b.classList.remove('active-op'));
    document.querySelectorAll('.btn.op').forEach(b => { if (b.dataset.op === op) b.classList.add('active-op'); });
    updateDisplay();
  }

  function equals() {
    if (!state.op || state.prev === null) return;
    const res = compute(state.prev, state.op, state.current);
    const histText = `${state.prev} ${state.op} ${state.current} =`;
    display.history.textContent = histText;
    if (res === 'Error') { state.current = 'Error'; state.op = null; updateDisplay(); return; }
    state.expression = '';
    state.current = formatNum(res);
    state.prev = null;
    state.op = null;
    state.justComputed = true;
    document.querySelectorAll('.btn.op').forEach(b => b.classList.remove('active-op'));
    updateDisplay();
  }

  function clear() {
    state = { current: '0', prev: null, op: null, justComputed: false, expression: '' };
    display.history.textContent = '';
    document.querySelectorAll('.btn.op').forEach(b => b.classList.remove('active-op'));
    updateDisplay();
  }

  function backspace() {
    if (state.justComputed) return;
    state.current = state.current.length > 1 ? state.current.slice(0, -1) : '0';
    updateDisplay();
  }

  // Button events
  document.querySelectorAll('[data-num]').forEach(btn => {
    btn.addEventListener('click', () => inputNum(btn.dataset.num));
  });

  document.querySelectorAll('[data-op]').forEach(btn => {
    btn.addEventListener('click', () => setOp(btn.dataset.op));
  });

  document.querySelector('[data-action="equals"]').addEventListener('click', equals);
  document.querySelector('[data-action="clear"]').addEventListener('click', clear);
  document.querySelector('[data-action="dot"]').addEventListener('click', () => inputNum('.'));
  document.querySelector('[data-action="percent"]').addEventListener('click', () => {
    state.current = formatNum(parseFloat(state.current) / 100);
    updateDisplay();
  });
  document.querySelector('[data-action="sign"]').addEventListener('click', () => {
    state.current = formatNum(-parseFloat(state.current));
    updateDisplay();
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputNum(e.key);
    else if (e.key === '.') inputNum('.');
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('−');
    else if (e.key === '*') setOp('×');
    else if (e.key === '/') { e.preventDefault(); setOp('÷'); }
    else if (e.key === 'Enter' || e.key === '=') equals();
    else if (e.key === 'Escape') clear();
    else if (e.key === 'Backspace') backspace();
    else if (e.key === '%') {
      state.current = formatNum(parseFloat(state.current) / 100);
      updateDisplay();
    }
  });

  updateDisplay();
</script>
</body>
</html>
